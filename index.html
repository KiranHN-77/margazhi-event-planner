    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ebe4;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
    .app{position:relative;min-height:100vh;background:#f0ebe4;}
    .screen{padding-bottom:80px;min-height:100vh;}
    .gradient-maroon{background:linear-gradient(135deg,#7B1818 0%,#4A0E0E 100%);}
    .onboard-bg{min-height:100vh;background:linear-gradient(160deg,#7B1818 0%,#4A0E0E 50%,#2A0808 100%);}
    .event-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;transition:transform 0.15s;}
    .event-card:active{transform:scale(0.98);}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;border-top:1px solid #e5e5e5;padding:8px 0 16px;z-index:100;}
    .chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;border:1.5px solid transparent;}
    .chip.on{background:#7B1818;color:white;border-color:#7B1818;}
    .chip.off{background:white;color:#555;border-color:#ddd;}
    .scroll-x{overflow-x:auto;display:flex;gap:8px;padding-bottom:4px;scrollbar-width:none;}
    .scroll-x::-webkit-scrollbar{display:none;}
    .modal-overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100vh;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;}
    .modal-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px;}
    .input{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none;transition:border-color 0.15s;}
    .input:focus{border-color:#7B1818;}
    .btn-primary{width:100%;padding:14px;background:#7B1818;color:white;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;}
    .btn-primary:active{opacity:0.85;}
    .btn-secondary{width:100%;padding:14px;background:transparent;color:#7B1818;border:2px solid #7B1818;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;}
    .btn-gold{width:100%;padding:14px;background:#C9A227;color:white;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;}
    .interest-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .icard{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:14px;padding:16px 8px;text-align:center;cursor:pointer;transition:all 0.15s;}
    .icard.sel{background:rgba(201,162,39,0.3);border-color:#C9A227;}
    .zone-chip{padding:10px 18px;border-radius:20px;font-size:14px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);color:white;background:rgba(255,255,255,0.1);}
    .zone-chip.sel{background:#C9A227;border-color:#C9A227;}
    .progress-bar{height:4px;border-radius:2px;background:#e5e5e5;overflow:hidden;}
    .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#C9A227,#F0C040);}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:12px 20px;border-radius:10px;font-size:14px;z-index:1000;white-space:nowrap;}
    .success-circle{width:80px;height:80px;border-radius:50%;background:#22C55E;display:flex;align-items:center;justify-content:center;margin:0 auto;animation:pop 0.5s ease;}
    @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}

function AppProvider({children}){

  const [onboarded,setOnboarded] = useState(false);
  const [prefs,setPrefs] = useState({interests:[],zone:'',notifs:true});
  const [bookings,setBookings] = useState([]);
  const [toast,setToast] = useState(null);

  const t = k => T[lang][k] || k;
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };
  const addBooking = b => setBookings(p=>[b,...p]);

  return (
    <Ctx.Provider value={{lang,setLang,t,onboarded,setOnboarded,prefs,setPrefs,bookings,addBooking,showToast}}>
      {children}
      {toast && <div className="toast">{toast}</div>}
    </Ctx.Provider>
  );
}

// ── HOME SCREEN ───────────────────────────────────────────────
function HomeScreen({onEventClick}){
  const {t,lang,prefs} = useContext(Ctx);
  const [search,setSearch] = useState('');
  const [showFilter,setShowFilter] = useState(false);
  const [filters,setFilters] = useState({interest:'',date:'',zone:prefs.zone||'',food:'',group:1});
  const [quick,setQuick] = useState('all');

  // Weekend dates
  const dow = today.getDay();
  const dToSat = dow===6?0:(6-dow);
  const dToSun = dow===0?0:(7-dow);
  const weekendDates = [fmt(addDays(today,dToSat||7)),fmt(addDays(today,dToSun||7))];

  const filtered = EVENTS.filter(e=>{
    const q = search.toLowerCase();
    if(q && !e.title.toLowerCase().includes(q) && !e.titleTa.includes(search) && !e.artist.toLowerCase().includes(q)) return false;
    if(filters.interest && e.category!==filters.interest) return false;
    if(filters.date==='weekend' && !weekendDates.includes(e.date)) return false;
    else if(filters.date && filters.date!=='weekend' && e.date!==filters.date) return false;
    if(filters.zone && e.zone!==filters.zone) return false;
    if(filters.food){
      const cs=CANTEENS[e.venue]||[];
      if(!cs.some(c=>c.dietary.includes(filters.food))) return false;
    }
    if(quick==='today' && e.date!==fmt(today)) return false;
    if(quick==='free' && e.price!==0) return false;
    if(quick==='music' && e.category!=='music') return false;
    if(quick==='dance' && e.category!=='dance') return false;
    if(e.available<filters.group) return false;
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const activeCount = [filters.interest,filters.date,filters.food,filters.zone].filter(Boolean).length+(filters.group>1?1:0);
  const quickOpts = [
    {id:'all',l:lang==='ta'?'அனைத்தும்':'All'},
    {id:'today',l:lang==='ta'?'இன்று':'Today'},
    {id:'free',l:lang==='ta'?'இலவசம்':'Free'},
    {id:'music',l:lang==='ta'?'இசை':'Music'},
    {id:'dance',l:lang==='ta'?'நடனம்':'Dance'},
  ];

  return (
    <div className="screen">
      {/* Header */}
      <div className="gradient-maroon" style={{padding:'48px 18px 18px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <div style={{color:'#C9A227',fontSize:24,fontWeight:900,letterSpacing:0.5}}>{t('appName')}</div>
            <div style={{color:'rgba(255,255,255,0.65)',fontSize:11}}>
              {lang==='ta'?'சென்னை நிகழ்வுகள்':'Chennai Events'}
            </div>
          </div>
          <div style={{background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'6px 12px',color:'white',fontSize:12,cursor:'pointer'}}
            onClick={()=>setShowFilter(true)}>
            📍 {filters.zone||(lang==='ta'?'அனைத்தும்':'All Chennai')}
          </div>
        </div>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#bbb'}}><Ico.Search /></div>
          <input className="input" style={{paddingLeft:42,background:'rgba(255,255,255,0.95)'}}
            placeholder={t('search')} value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {/* Quick filters */}
      <div style={{background:'white',padding:'10px 16px',borderBottom:'1px solid #f0f0f0',display:'flex',gap:8,alignItems:'center'}}>
        <div className="scroll-x" style={{flex:1}}>
          {quickOpts.map(q=>(
            <div key={q.id} className={`chip ${quick===q.id?'on':'off'}`} onClick={()=>setQuick(q.id)}>{q.l}</div>
          ))}
        </div>
        <button onClick={()=>setShowFilter(true)} style={{
          display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:20,border:'none',cursor:'pointer',
          background:activeCount>0?'#7B1818':'#f5f5f5',color:activeCount>0?'white':'#555',
          fontSize:12,fontWeight:600,flexShrink:0
        }}>
          <Ico.Filter /> {t('filter')}{activeCount>0?` (${activeCount})`:''}
        </button>
      </div>

      {/* Events */}
      <div style={{padding:'14px 16px'}}>
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px',color:'#888'}}>
            <div style={{fontSize:48,marginBottom:12}}>🎭</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>{t('noEvents')}</div>
            <button onClick={()=>{setFilters({interest:'',date:'',zone:'',food:'',group:1});setQuick('all');setSearch('');}}
              style={{color:'#7B1818',background:'none',border:'none',cursor:'pointer',fontWeight:600,fontSize:14}}>
              Clear Filters
            </button>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{fontSize:12,color:'#999',marginBottom:2}}>
              {filtered.length} {lang==='ta'?'நிகழ்வுகள்':'events found'}
            </div>
            {filtered.map(ev=><EventCard key={ev.id} event={ev} onClick={()=>onEventClick(ev)}/>)}
          </div>
        )}
      </div>

      {showFilter&&<FilterModal filters={filters} onChange={setFilters} onClose={()=>setShowFilter(false)}/>}
    </div>
  );
}

// ── BOOKING FLOW ──────────────────────────────────────────────
function BookingFlow({event,type,onBack,onConfirm}){
  const {t,lang,showToast} = useContext(Ctx);
  const [step,setStep] = useState(1);
  const [count,setCount] = useState(type==='group'?2:1);
  const [members,setMembers] = useState(['']);
  const [payMethod,setPayMethod] = useState('upi');
  const title = lang==='ta'?event.titleTa:event.title;
  const total = event.price*count;

  const changeCount = n => {
    const nc = Math.max(1,Math.min(event.available,n));
    setCount(nc);
    setMembers(Array.from({length:Math.max(0,nc-1)},(_,i)=>members[i]||''));
  };

  const proceed = () => {
    if(type==='group'&&count>1&&members.some(m=>!m.trim())){showToast("Enter all member names");return;}
    setStep(2);
  };

  const pay = () => onConfirm({
    event,type,count,members:['You',...members.slice(0,count-1)],payMethod,total,
    bookingId:'MRZ'+Math.random().toString(36).substr(2,6).toUpperCase(),
    bookedAt:new Date().toISOString(),
  });

  return (
    <div className="screen" style={{background:'white',minHeight:'100vh'}}>
      <div className="gradient-maroon" style={{padding:'48px 18px 18px'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:10,padding:'7px 14px',color:'white',cursor:'pointer',marginBottom:14,display:'flex',alignItems:'center',gap:8,fontSize:13}}>
          <Ico.Back /> Back
        </button>
        <div style={{color:'#C9A227',fontSize:13,marginBottom:4}}>{type==='group'?'👥 Group Booking':'👤 Solo Booking'}</div>
        <div style={{color:'white',fontSize:19,fontWeight:700,lineHeight:1.3}}>{title}</div>
        <div style={{color:'rgba(255,255,255,0.65)',fontSize:12,marginTop:4}}>{event.venue} · {event.zone}</div>
      </div>

      <div style={{padding:'18px'}}>
        {step===1?(
          <>
            {/* Ticket count */}
            <div style={{background:'#FDF8F0',borderRadius:14,padding:'16px',marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Number of Tickets</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <button onClick={()=>changeCount(count-1)} style={{width:40,height:40,borderRadius:'50%',border:'2px solid #7B1818',background:'white',color:'#7B1818',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ico.Minus />
                </button>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:38,fontWeight:800,color:'#7B1818'}}>{count}</div>
                  <div style={{fontSize:12,color:'#aaa'}}>{count===1?'ticket':'tickets'}</div>
                </div>
                <button onClick={()=>changeCount(count+1)} style={{width:40,height:40,borderRadius:'50%',border:'none',background:'#7B1818',color:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ico.Plus />
                </button>
              </div>
            </div>

            {type==='group'&&count>1&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{t('addMembers')}</div>
                {members.map((m,i)=>(
                  <input key={i} className="input" style={{marginBottom:8}}
                    placeholder={`Member ${i+2} name`} value={m}
                    onChange={e=>{const nm=[...members];nm[i]=e.target.value;setMembers(nm);}}/>
                ))}
              </div>
            )}

            {/* Price summary */}
            <div style={{border:'1px solid #eee',borderRadius:14,padding:'14px',marginBottom:18}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:7,fontSize:13}}>
                <span>₹{event.price} × {count} ticket{count>1?'s':''}</span><span>₹{total}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:7,fontSize:13,color:'#22C55E'}}>
                <span>Convenience fee</span><span>₹0</span>
              </div>
              <div style={{borderTop:'1px solid #eee',paddingTop:8,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:16}}>
                <span>Total</span>
                <span style={{color:'#7B1818'}}>{total===0?'FREE':`₹${total}`}</span>
              </div>
            </div>

            <button className="btn-primary" onClick={proceed}>
              {t('proceedPay')} {total>0?`→ ₹${total}`:'→ Free'}
            </button>
          </>
        ):(
          <>
            <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Choose Payment Method</div>

            {[
              {id:'upi',icon:'📱',label:'UPI / BHIM',sub:'GPay, PhonePe, Paytm, BHIM'},
              {id:'card',icon:'💳',label:'Credit / Debit Card',sub:'Visa, Mastercard, RuPay'},
              {id:'netbanking',icon:'🏦',label:'Net Banking',sub:'All major Indian banks'},
            ].map(p=>(
              <div key={p.id} onClick={()=>setPayMethod(p.id)} style={{
                border:`2px solid ${payMethod===p.id?'#7B1818':'#eee'}`,
                background:payMethod===p.id?'#FDF0F0':'white',
                borderRadius:14,padding:'13px 16px',marginBottom:12,cursor:'pointer',
                display:'flex',alignItems:'center',gap:14
              }}>
                <span style={{fontSize:28}}>{p.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{p.label}</div>
                  <div style={{fontSize:12,color:'#999'}}>{p.sub}</div>
                </div>
                {payMethod===p.id&&<div style={{width:20,height:20,borderRadius:'50%',background:'#7B1818',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>}
              </div>
            ))}

            <div style={{background:'#F0FDF4',borderRadius:12,padding:'11px 14px',marginBottom:18,display:'flex',gap:10,alignItems:'center'}}>
              <span>🔒</span>
              <div style={{fontSize:12,color:'#166534'}}>Secured by PCI-DSS compliant gateway. Card data never stored on Margazhi servers.</div>
            </div>

            <button className="btn-primary" onClick={pay}>
              {total===0?'✓ Confirm Free Booking':`Pay ₹${total} Securely`}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function MyBookings({bookings,onEventClick}){
  const {t,lang} = useContext(Ctx);
  const [tab,setTab] = useState('upcoming');
  const now = new Date();
  const upcoming = bookings.filter(b=>new Date(b.event.date)>=now);
  const past = bookings.filter(b=>new Date(b.event.date)<now);
  const shown = tab==='upcoming'?upcoming:past;

  return (
    <div className="screen">
      <div className="gradient-maroon" style={{padding:'48px 18px 18px'}}>
        <div style={{color:'#C9A227',fontSize:24,fontWeight:800}}>{t('myBookings')}</div>

      <div style={{background:'white',display:'flex',borderBottom:'1px solid #eee'}}>
        {['upcoming','past'].map(tabId=>(
          <button key={tabId} onClick={()=>setTab(tabId)} style={{
            flex:1,padding:'13px',border:'none',cursor:'pointer',background:'none',fontSize:14,fontWeight:600,
            color:tab===tabId?'#7B1818':'#aaa',
            borderBottom:tab===tabId?'2px solid #7B1818':'2px solid transparent',

        {shown.length===0?(
          <div style={{textAlign:'center',padding:'60px 20px',color:'#aaa'}}>
            <div style={{fontSize:48,marginBottom:12}}>{tab==='upcoming'?'📅':'📋'}</div>

                    <div style={{fontSize:12,color:'#888'}}>{b.event.artist}</div>
                  </div>
                  <span style={{fontSize:26,marginLeft:10}}>{b.event.emoji}</span>
                </div>
                <div style={{display:'flex',gap:10,fontSize:11,color:'#aaa',marginBottom:9}}>
                  <span>📅 {new Date(b.event.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
                  <span>🕐 {b.event.time}</span>
                  <span>📍 {b.event.zone}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:9,borderTop:'1px solid #f5f5f5'}}>
                  <div>
                    <div style={{fontSize:10,color:'#bbb'}}>Booking ID</div>
                    <div style={{fontSize:12,fontWeight:700,color:'#7B1818',letterSpacing:1}}>{b.bookingId}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:10,color:'#bbb'}}>{b.count} ticket{b.count>1?'s':''}</div>
                    <div style={{fontSize:13,fontWeight:700,color:b.total===0?'#22C55E':'#1a1a1a'}}>{b.total===0?'Free':`₹${b.total}`}</div>

              <I />
              {id==='bookings'&&badgeCount>0&&(
                <div style={{position:'absolute',top:-4,right:-6,background:'#7B1818',color:'white',borderRadius:'50%',width:15,height:15,fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>
                  {badgeCount}
                </div>
              )}
            </div>
            <span style={{fontSize:10,fontWeight:current===id?700:400}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function MainApp(){
  const {bookings,addBooking} = useContext(Ctx);
  const [navTab,setNavTab] = useState('home');
  const [screen,setScreen] = useState('home');
  const [selectedEvent,setSelectedEvent] = useState(null);
  const [bookType,setBookType] = useState(null);
  const [confirmedBooking,setConfirmedBooking] = useState(null);

  const goEvent = ev => { setSelectedEvent(ev); setScreen('detail'); };
  const goBook = (ev,type) => { setSelectedEvent(ev); setBookType(type); setScreen('booking'); };
  const goConfirm = booking => { addBooking(booking); setConfirmedBooking(booking); setScreen('confirmation'); };

  const goNav = tab => { setNavTab(tab); setScreen(tab); setSelectedEvent(null); };

  const showNav = !['booking','confirmation'].includes(screen);

  let content;
  if(screen==='detail'&&selectedEvent) content=<EventDetail event={selectedEvent} onBack={()=>setScreen(navTab)} onBook={goBook}/>;
  else if(screen==='booking'&&selectedEvent) content=<BookingFlow event={selectedEvent} type={bookType} onBack={()=>setScreen('detail')} onConfirm={goConfirm}/>;
  else if(screen==='confirmation'&&confirmedBooking) content=<BookingConfirmation booking={confirmedBooking} onDone={()=>goNav('bookings')}/>;
  else if(navTab==='bookings') content=<MyBookings bookings={bookings} onEventClick={goEvent}/>;
  else if(navTab==='notifications') content=<NotificationsScreen/>;
  else if(navTab==='profile') content=<Profile/>;
  else content=<HomeScreen onEventClick={goEvent}/>;

  return (
    <div className="app">
      {content}
      {showNav&&<BottomNav current={navTab} onChange={goNav} badgeCount={bookings.length}/>}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function App(){
  const {onboarded} = useContext(Ctx);
  return onboarded?<MainApp/>:<Onboarding/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App/></AppProvider>
);
</script>
</body>
</html>
